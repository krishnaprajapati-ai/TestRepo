name: Deploy to UAT

on:
  push:
    branches: [ UAT ]
    paths:
      - 'force-app/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: UAT
    steps:
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: 'Checkout source code'
        uses: actions/checkout@v3
        with:
          fetch-depth: 2
          
      - name: 'Install Salesforce CLI'
        run: npm install @salesforce/cli --global
        
      - name: 'Install sfdx-git-delta'
        run: |
          echo Y | sfdx plugins:install sfdx-git-delta
          sfdx plugins
          
      - name: 'Create delta packages'
        run: |
          mkdir changed-sources
          sf sgd source delta --to "HEAD" --from "HEAD~1" --output changed-sources/ --generate-delta --source force-app/
          echo "[INFO] Diff generated"
          
      - name: 'Deploy to UAT Org'
        run: |
          cat > server.key <<'EOF'
          ${{ secrets.JWT_SERVER_KEY }}
          EOF
          chmod 600 server.key
          
          sf org login jwt \
            --username "${{ secrets.DEPLOYMENT_USER_NAME_UAT }}" \
            --jwt-key-file server.key \
            --client-id "${{ secrets.CONSUMER_KEY_UAT }}" \
            --instance-url "${{ vars.INSTANCE_URL_UAT }}" \
            --set-default
            
          sf project deploy start --source-dir changed-sources/force-app --test-level RunLocalTests