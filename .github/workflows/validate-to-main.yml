name: Validate PR to Main

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'force-app/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    environment: Hello
    steps:
      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 'Checkout source code'
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 'Install Salesforce CLI'
        run: npm install @salesforce/cli --global

      - name: 'Install sfdx-git-delta'
        run: |
          echo Y | sfdx plugins:install sfdx-git-delta
          sfdx plugins

      - name: 'Create delta packages'
        run: |
          mkdir changed-sources
          sf sgd source delta --to "HEAD" --from "origin/main" --output changed-sources/ --generate-delta --source force-app/
          echo "[INFO] Diff generated"

      - name: 'Validate against Hello Org (Check-Only)'
        run: |
          echo "${{ secrets.JWT_SERVER_KEY }}" > server.key
          chmod 600 server.key
          sf org login jwt --username "${{ secrets.DEPLOYMENT_USER_NAME }}" --jwt-key-file server.key --client-id "${{ secrets.CONSUMER_KEY }}" --instance-url "${{ vars.INSTANCE_URL }}" --set-default
          sf project deploy start --source-dir changed-sources/force-app --test-level RunLocalTests --dry-run